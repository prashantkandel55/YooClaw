<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YooClaw | Your AI Agent Unleashed</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='Arial, sans-serif' font-weight='bold' font-size='50' fill='white'>YC</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-body: #0d0d1a;
      --bg-sidebar: #111126;
      --bg-card: #1a1a2e;
      --bg-input: #0f0f1f;
      --bg-log: #0a0a18;

      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #06b6d4;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --border: rgba(255, 255, 255, 0.08);
      --focus-glow: 0 0 0 2px rgba(99, 102, 241, 0.4);

      --sidebar-width: 220px;
      --topbar-height: 48px;
      --log-height: 80px;
      --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-body);
      background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* --- Sidebar --- */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .logo-section {
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-box {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      color: white;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
    }

    .app-name {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    .nav-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
    }

    .nav-group-label {
      display: block;
      padding: 16px 12px 8px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .nav-item {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      border: none;
      background: transparent;
      text-align: left;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      color: white;
      background: rgba(255, 255, 255, 0.04);
      transform: translateX(2px);
    }

    .nav-item.active {
      background: rgba(99, 102, 241, 0.12);
      color: var(--primary);
      border-left: 2px solid var(--primary);
      border-radius: 0 8px 8px 0;
      font-weight: 600;
    }

    .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .agent-status-box {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite ease-in-out;
    }

    /* --- Main Layout --- */
    .wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      height: var(--topbar-height);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(13, 13, 26, 0.5);
      backdrop-filter: blur(8px);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .badge {
      background: var(--primary);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 100px;
    }

    .status-dot-api {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #475569;
    }

    .api-ready {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      position: relative;
    }

    .log-strip {
      height: var(--log-height);
      background: var(--bg-log);
      border-top: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .log-header {
      padding: 4px 16px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    #log-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-entry {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .log-time {
      color: var(--text-muted);
    }

    .log-mod {
      color: var(--primary);
      font-weight: 600;
      min-width: 80px;
    }

    .log-msg {
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* --- Module View --- */
    .module-view {
      max-width: 800px;
      margin: 0 auto;
      animation: slideIn 180ms ease-out;
    }

    .module-header {
      margin-bottom: 24px;
    }

    .module-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .module-desc {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .input-card {
      margin-bottom: 24px;
    }

    .output-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0;
      display: none;
      overflow: hidden;
      transition: var(--transition);
    }

    .output-header {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .output-body {
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #d1d5db;
      white-space: pre-wrap;
      min-height: 100px;
    }

    /* --- Skeletons --- */
    .skeleton {
      display: none;
      padding: 2px;
    }

    .shimmer-line {
      height: 14px;
      background: linear-gradient(90deg, #1e1e3f 25%, #2a2a50 50%, #1e1e3f 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    /* --- Welcome Screen --- */
    .welcome-screen {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 24px;
    }

    .welcome-logo {
      width: 80px;
      height: 80px;
      background: var(--primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 900;
      color: white;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
    }

    .welcome-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 280px;
    }

    /* --- Settings Modal --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      width: 400px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* --- Utilities --- */
    button.primary {
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      font-weight: 700;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      transition: all 0.2s;
    }

    button.primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    button.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    button.ghost {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 600;
      width: 100%;
    }

    button.ghost:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    input,
    textarea,
    select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: var(--focus-glow);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.1);
        opacity: 1;
      }

      100% {
        transform: scale(0.95);
        opacity: 0.8;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #1e1e3a;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }

    .hide {
      display: none;
    }

    .show {
      display: block;
    }

    .flex {
      display: flex;
    }

    .indicator-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow: 0 0 6px currentColor;
    }

    .color-indigo {
      background: #6366f1;
      color: #6366f1;
    }

    .color-cyan {
      background: #06b6d4;
      color: #06b6d4;
    }

    .color-blue {
      background: #3b82f6;
      color: #3b82f6;
    }

    .color-amber {
      background: #d97706;
      color: #d97706;
    }

    .color-emerald {
      background: #10b981;
      color: #10b981;
    }

    .color-red {
      background: #ef4444;
      color: #ef4444;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo-section">
      <div class="logo-box">YC</div>
      <span class="app-name">YooClaw</span>
    </div>

    <div class="nav-scroll" id="nav-container">
      <!-- Nav groups injected by JS -->
    </div>

    <div class="sidebar-footer">
      <div class="agent-status-box">
        <div class="pulse-dot"></div>
        <span id="sidebar-agent-name">YooAgent</span>
      </div>

      <div style="font-size: 10px; color: var(--text-muted); margin-bottom: 12px;">
        Cmd + Enter to Run<br>Esc to Clear
      </div>

      <button class="ghost" style="padding: 6px; font-size: 12px;" onclick="openSettings()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        Settings
      </button>
    </div>
  </aside>

  <!-- Main Wrapper -->
  <div class="wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <span id="active-mod-name" style="font-weight: 700; color: white;">Welcome</span>
      </div>
      <div class="topbar-right">
        <div class="badge" id="top-model-name">claude-sonnet-4</div>
        <div class="status-dot-api" id="api-status-dot"></div>
      </div>
    </header>

    <main class="content-area" id="main-content">
      <!-- Dynamic Content -->
    </main>

    <footer class="log-strip">
      <div class="log-header">Agent Activity Log</div>
      <div id="log-container"></div>
    </footer>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h2 style="margin-bottom: 24px; font-weight: 800;">Agent Settings</h2>

      <div class="input-group">
        <label>Anthropic API Key</label>
        <div style="position: relative;">
          <input type="password" id="api-key-input" placeholder="sk-ant-...">
          <button onclick="toggleKeyVisibility()"
            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;">
            👁️
          </button>
        </div>
      </div>

      <div class="input-group">
        <label>Agent Name</label>
        <input type="text" id="agent-name-input" value="YooAgent">
      </div>

      <div class="input-group">
        <label>Model Selector</label>
        <select id="model-select">
          <option value="claude-sonnet-4-20250514" selected>claude-sonnet-4-20250514</option>
          <option value="claude-3-5-sonnet-20240620">claude-3-5-sonnet-20240620</option>
        </select>
      </div>

      <div style="display: flex; gap: 12px; margin-top: 32px;">
        <button class="ghost" style="flex: 1;" onclick="testApiConnection()" id="test-btn">Test Connection</button>
        <button class="primary" style="flex: 1;" onclick="saveSettings()">Save & Close</button>
      </div>
      <div id="test-feedback" style="margin-top: 12px; text-align: center; font-size: 12px;"></div>
    </div>
  </div>

  <script>
    // --- Data & State ---
    const CATEGORIES = [
      { id: 'productivity', label: 'Productivity', color: 'indigo' },
      { id: 'research', label: 'Research', color: 'cyan' },
      { id: 'communication', label: 'Communication', color: 'blue' },
      { id: 'dev-tools', label: 'Developer Tools', color: 'amber' },
      { id: 'data', label: 'Data & Reports', color: 'emerald' },
      { id: 'security', label: 'Security', color: 'red' }
    ];

    const MODULES = [
      // Productivity
      {
        id: 'task-prioritizer', cat: 'productivity', title: 'Task Prioritizer', desc: 'Rank tasks by urgency and importance.',
        prompt: 'You are a productivity expert. The user will give you a raw list of tasks. Rank them by urgency and importance using the Eisenhower Matrix. Format output as: [URGENT/IMPORTANT label] Task — one sentence reason. Be concise.',
        fields: [{ id: 'tasks', type: 'textarea', label: 'Task List', placeholder: 'Paste your task list here...' }]
      },
      {
        id: 'meeting-prep', cat: 'productivity', title: 'Meeting Prep', desc: 'Generate a concise meeting briefing.',
        prompt: 'You are an executive assistant. Generate a concise meeting briefing: agenda suggestions, key talking points, questions to ask, and a 2-sentence summary of what success looks like.',
        fields: [{ id: 'title', type: 'text', label: 'Meeting Title', placeholder: 'e.g. Project Alpha Sync' }, { id: 'attendees', type: 'text', label: 'Attendees', placeholder: 'Names...' }, { id: 'goal', type: 'text', label: 'Goal', placeholder: 'What is the main objective?' }]
      },
      {
        id: 'daily-standup', cat: 'productivity', title: 'Daily Standup', desc: 'Format a professional scrum update.',
        prompt: 'You are a scrum master assistant. Format a professional standup update from the user\'s bullet points. Output: Yesterday, Today, Blockers — each as 1-2 clean sentences.',
        fields: [{ id: 'yesterday', type: 'textarea', label: 'Yesterday', placeholder: 'What you did...' }, { id: 'today', type: 'textarea', label: 'Today', placeholder: 'What you will do...' }, { id: 'blockers', type: 'textarea', label: 'Blockers', placeholder: 'Any obstacles?' }]
      },

      // Research
      {
        id: 'web-research', cat: 'research', title: 'Web Research', desc: 'Deep search summarized with citations.',
        prompt: 'You are a research analyst. Given a topic, provide: a 3-paragraph summary, 5 key facts, 3 open questions, and 3 recommended next steps. Be factual and structured.',
        fields: [{ id: 'topic', type: 'textarea', label: 'Topic', placeholder: 'What are you researching?' }]
      },
      {
        id: 'competitor-monitor', cat: 'research', title: 'Competitor Monitor', desc: 'Generate intelligence digest of competitors.',
        prompt: 'You are a competitive intelligence analyst. Given competitor names, generate a mock intelligence digest: recent activity, product updates, pricing signals, and strategic implications. Format as a structured report.',
        fields: [{ id: 'competitors', type: 'textarea', label: 'Competitor Names', placeholder: 'Enter names...' }]
      },
      {
        id: 'price-tracker', cat: 'research', title: 'Price Tracker', desc: 'Strategies for tracking product deals.',
        prompt: 'You are a deal-finding assistant. Given a product and target price, generate: a price tracking strategy, suggested alert thresholds, and the best platforms to monitor. Be specific and actionable.',
        fields: [{ id: 'product', type: 'text', label: 'Product', placeholder: 'Name...' }, { id: 'current', type: 'text', label: 'Current Price', placeholder: '' }, { id: 'target', type: 'text', label: 'Target Price', placeholder: '' }]
      },

      // Communication
      {
        id: 'email-drafter', cat: 'communication', title: 'Email Drafter', desc: 'Turn bullets into professional email.',
        prompt: 'You are a professional email writer. Write a complete email with subject line based on the bullet points provided. Match the requested tone exactly. Include subject: on the first line.',
        fields: [{ id: 'points', type: 'textarea', label: 'Key Points', placeholder: 'Bullet points...' }, { id: 'tone', type: 'select', label: 'Tone', options: ['Formal', 'Casual', 'Friendly', 'Assertive'] }]
      },
      {
        id: 'reply-suggester', cat: 'communication', title: 'Reply Suggester', desc: 'Context-aware reply options.',
        prompt: 'You are a communication coach. Given an incoming message, write 3 distinct reply options: Option A (direct and brief), Option B (warm and detailed), Option C (diplomatic/neutral). Label each clearly.',
        fields: [{ id: 'message', type: 'textarea', label: 'Incoming Message', placeholder: 'Paste message here...' }]
      },
      {
        id: 'tone-fixer', cat: 'communication', title: 'Tone Fixer', desc: 'Adjust text tone while keeping meaning.',
        prompt: 'You are a writing coach. Rewrite the user\'s draft text in the requested tone while preserving the meaning exactly. Show: Original (quoted), then Rewritten version.',
        fields: [{ id: 'draft', type: 'textarea', label: 'Draft Text', placeholder: 'Paste text...' }, { id: 'targetTone', type: 'select', label: 'Target Tone', options: ['Professional', 'Friendly', 'Confident', 'Empathetic'] }]
      },

      // Dev Tools
      {
        id: 'pr-reviewer', cat: 'dev-tools', title: 'PR Reviewer', desc: 'Analyze PR diffs or descriptions.',
        prompt: 'You are a senior software engineer doing a code review. Analyze the PR description or diff and provide: Summary (2 sentences), Potential Issues (bulleted), Suggestions (bulleted), Verdict (Approve / Request Changes / Needs Discussion).',
        maxTokens: 2048,
        fields: [{ id: 'diff', type: 'textarea', label: 'PR Diff / Description', placeholder: 'Paste here...' }]
      },
      {
        id: 'error-explainer', cat: 'dev-tools', title: 'Error Explainer', desc: 'Fix suggestions for stack traces.',
        prompt: 'You are a debugging expert. Given a stack trace or error message, explain: What went wrong (plain English), Why it happened, How to fix it (step by step). Be concrete and actionable.',
        fields: [{ id: 'error', type: 'textarea', label: 'Error Stack', placeholder: 'Paste stack trace...' }]
      },
      {
        id: 'commit-gen', cat: 'dev-tools', title: 'Commit Message Gen', desc: 'Format conventional commits.',
        prompt: 'You are a git expert. Generate a commit message following Conventional Commits format (type(scope): description). Also provide 3 alternative messages. Be specific about what changed.',
        fields: [{ id: 'changes', type: 'textarea', label: 'Changes', placeholder: 'What changed?' }]
      },

      // Data
      {
        id: 'csv-analyst', cat: 'data', title: 'CSV Analyst', desc: 'Query data using natural language.',
        prompt: 'You are a data analyst. The user will paste CSV data and ask a question about it. Answer the question clearly using the data. Show any calculations. Format findings in plain language.',
        fields: [{ id: 'csv', type: 'textarea', label: 'CSV Data', placeholder: 'Paste CSV...' }, { id: 'query', type: 'text', label: 'Question', placeholder: 'Ask something about the data...' }]
      },
      {
        id: 'report-builder', cat: 'data', title: 'Weekly Report Builder', desc: 'Create professional progress reports.',
        prompt: 'You are a report writer. Generate a professional weekly report from the user\'s notes. Sections: Executive Summary, Key Accomplishments, Metrics & Progress, Blockers, Next Week Plan. Use clean formatting.',
        maxTokens: 2048,
        fields: [{ id: 'notes', type: 'textarea', label: 'Week Notes', placeholder: 'List activities...' }, { id: 'team', type: 'text', label: 'Team Name', placeholder: '' }, { id: 'range', type: 'text', label: 'Date Range', placeholder: '' }]
      },

      // Security
      {
        id: 'injection-detector', cat: 'security', title: 'Injection Detector', desc: 'Scan for AI prompt injection.',
        prompt: 'You are a security analyst specializing in AI safety. Analyze the text for prompt injection attempts. Output: Risk Level (Safe / Suspicious / Dangerous), Confidence %, What was detected (if anything), Explanation. Be thorough.',
        fields: [{ id: 'text', type: 'textarea', label: 'Input Text', placeholder: 'Text to scan...' }]
      },
      {
        id: 'skill-chainer', cat: 'security', title: 'Skill Chainer', desc: 'Design optimal execution sequences.',
        prompt: 'You are an AI workflow orchestrator. Given a list of tasks or skill names, design an optimal execution chain: order of operations, what output from each step feeds the next, estimated tokens per step, and potential failure points.',
        fields: [{ id: 'skills', type: 'textarea', label: 'Skills/Tasks', placeholder: 'One per line...' }]
      }
    ];

    let state = {
      apiKey: localStorage.getItem('yc_api_key') || '',
      agentName: localStorage.getItem('yc_agent_name') || 'YooAgent',
      model: localStorage.getItem('yc_model') || 'claude-sonnet-4-20250514',
      activeModule: null,
      logs: []
    };

    // --- Initialization ---
    window.onload = () => {
      renderSidebar();
      updateHeader();
      if (!state.apiKey) openSettings();
      else {
        showWelcome();
        checkApiStatus();
      }
    };

    function renderSidebar() {
      const container = document.getElementById('nav-container');
      container.innerHTML = '';

      CATEGORIES.forEach(cat => {
        const group = document.createElement('div');
        group.className = 'nav-group';
        group.innerHTML = `<span class="nav-group-label">${cat.label}</span>`;

        const mods = MODULES.filter(m => m.cat === cat.id);
        mods.forEach(mod => {
          const item = document.createElement('button');
          item.className = `nav-item ${state.activeModule?.id === mod.id ? 'active' : ''}`;
          item.onclick = () => loadModule(mod.id);
          item.innerHTML = `
                        <div class="nav-dot color-${cat.color}"></div>
                        <span>${mod.title}</span>
                    `;
          group.appendChild(item);
        });
        container.appendChild(group);
      });
    }

    function updateHeader() {
      document.getElementById('sidebar-agent-name').innerText = state.agentName;
      document.getElementById('top-model-name').innerText = state.model;
      document.getElementById('active-mod-name').innerText = state.activeModule?.title || 'Open Dashboard';
    }

    function showWelcome() {
      state.activeModule = null;
      updateHeader();
      renderSidebar();
      const main = document.getElementById('main-content');
      main.innerHTML = `
                <div class="welcome-screen">
                    <div class="welcome-logo">YC</div>
                    <h1 style="font-size: 32px; font-weight: 800;">YooClaw</h1>
                    <p class="muted">Your AI agent, unleashed.</p>
                    <div class="welcome-buttons">
                        <button class="ghost" onclick="loadModule('task-prioritizer')">Prioritize my tasks ↗</button>
                        <button class="ghost" onclick="loadModule('email-drafter')">Draft an email ↗</button>
                        <button class="ghost" onclick="loadModule('error-explainer')">Explain an error ↗</button>
                    </div>
                </div>
            `;
    }

    function loadModule(id) {
      const mod = MODULES.find(m => m.id === id);
      state.activeModule = mod;
      renderSidebar();
      updateHeader();
      const main = document.getElementById('main-content');

      let fieldsHtml = mod.fields.map(f => `
                <div class="input-group">
                    <label>${f.label}</label>
                    ${f.type === 'textarea' ? `<textarea id="f-${f.id}" placeholder="${f.placeholder}" rows="5"></textarea>` :
          f.type === 'select' ? `<select id="f-${f.id}">${f.options.map(o => `<option value="${o}">${o}</option>`).join('')}</select>` :
            `<input type="text" id="f-${f.id}" placeholder="${f.placeholder}">`
        }
                </div>
            `).join('');

      main.innerHTML = `
                <div class="module-view">
                    <header class="module-header">
                        <h2 class="module-title">${mod.title}</h2>
                        <p class="module-desc">${mod.desc}</p>
                    </header>
                    
                    <div class="card input-card">
                        ${fieldsHtml}
                        <div style="display: flex; gap: 12px; margin-top: 8px;">
                            <button class="primary" id="run-btn" onclick="runModule()">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg>
                                Run Module
                            </button>
                            <button class="ghost" style="width: 100px;" onclick="clearInputs()">Clear</button>
                        </div>
                    </div>

                    <div id="skeleton-area" class="skeleton">
                        <div class="shimmer-line" style="width: 40%"></div>
                        <div class="shimmer-line" style="width: 100%"></div>
                        <div class="shimmer-line" style="width: 90%"></div>
                        <div class="shimmer-line" style="width: 60%"></div>
                    </div>

                    <div class="output-card" id="output-box">
                        <div class="output-header">
                            <span class="small muted mono" id="metadata-text">AGENT_STREAM_IDLE</span>
                            <div style="display: flex; gap: 8px;">
                                <button class="ghost" style="padding: 4px 8px; font-size: 11px;" id="copy-btn" onclick="copyOutput()">Copy</button>
                            </div>
                        </div>
                        <div class="output-body" id="output-content"></div>
                    </div>
                </div>
            `;
    }

    // --- Logic ---
    async function runModule() {
      if (!state.apiKey) {
        log('System', 'API key missing. Open settings.', 'red');
        openSettings();
        return;
      }

      const mod = state.activeModule;
      const runBtn = document.getElementById('run-btn');
      const skeleton = document.getElementById('skeleton-area');
      const outputBox = document.getElementById('output-box');
      const outputText = document.getElementById('output-content');
      const metaText = document.getElementById('metadata-text');

      // Gather inputs
      let userInput = mod.fields.map(f => {
        const el = document.getElementById(`f-${f.id}`);
        return `${f.label}: ${el.value}`;
      }).join('\n');

      if (!userInput.trim()) {
        log(mod.title, 'Input required.', 'amber');
        return;
      }

      // UI State
      runBtn.disabled = true;
      runBtn.innerHTML = `<div class="spinner"></div> Generating...`;
      skeleton.style.display = 'block';
      outputBox.style.display = 'none';
      metaText.innerText = 'STREAM_CONNECTING...';

      log(mod.title, 'Initiating Claude API call...', 'amber');

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': state.apiKey,
            'anthropic-version': '2023-06-01',
            'content-type': 'application/json',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: state.model,
            max_tokens: mod.maxTokens || 1024,
            system: mod.prompt,
            messages: [{ role: 'user', content: userInput }]
          })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || 'API request failed');
        }

        const data = await response.json();
        const content = data.content[0].text;

        skeleton.style.display = 'none';
        outputBox.style.display = 'block';
        outputText.innerText = content;
        metaText.innerText = `READY | TOKENS: ${data.usage?.output_tokens}`;

        log(mod.title, 'Neural processing complete.', 'green');
        checkApiStatus(true);
      } catch (err) {
        skeleton.style.display = 'none';
        outputBox.style.display = 'block';
        outputBox.style.borderColor = 'var(--error)';
        outputText.innerText = 'Error: ' + err.message;
        metaText.innerText = 'STREAM_FAILED';
        log(mod.title, 'API Error: ' + err.message, 'red');
        checkApiStatus(false);
      } finally {
        runBtn.disabled = false;
        runBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg> Run Module`;
      }
    }

    function log(mod, msg, colorType) {
      const container = document.getElementById('log-container');
      const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
      const entry = document.createElement('div');
      entry.className = 'log-entry';

      let dotColor = '#10b981'; // green
      if (colorType === 'amber') dotColor = '#f59e0b';
      if (colorType === 'red') dotColor = '#ef4444';
      if (colorType === 'indigo') dotColor = '#6366f1';

      entry.innerHTML = `
                <div class="log-dot" style="background: ${dotColor}; box-shadow: 0 0 4px ${dotColor}"></div>
                <span class="log-time">[${time}]</span>
                <span class="log-mod">${mod.toUpperCase()}</span>
                <span class="log-msg">${msg}</span>
            `;

      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;

      // Limit to 50
      while (container.children.length > 50) container.removeChild(container.firstChild);
    }

    function clearInputs() {
      if (!state.activeModule) return;
      state.activeModule.fields.forEach(f => {
        document.getElementById(`f-${f.id}`).value = '';
      });
      document.getElementById('output-box').style.display = 'none';
      log(state.activeModule.title, 'Workspace cleared.', 'indigo');
    }

    function copyOutput() {
      const text = document.getElementById('output-content').innerText;
      const btn = document.getElementById('copy-btn');
      navigator.clipboard.writeText(text).then(() => {
        const oldText = btn.innerText;
        btn.innerText = 'Copied!';
        btn.style.color = 'var(--success)';
        btn.style.borderColor = 'var(--success)';
        setTimeout(() => {
          btn.innerText = oldText;
          btn.style.color = '';
          btn.style.borderColor = '';
        }, 1500);
      });
    }

    // --- Settings ---
    function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
    function toggleKeyVisibility() {
      const input = document.getElementById('api-key-input');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function testApiConnection() {
      const key = document.getElementById('api-key-input').value;
      const feedback = document.getElementById('test-feedback');
      const btn = document.getElementById('test-btn');

      if (!key) { feedback.innerText = 'Enter key first'; return; }

      btn.disabled = true;
      feedback.innerText = 'Authenticating...';
      feedback.style.color = 'var(--text-secondary)';

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({ model: 'claude-3-haiku-20240307', max_tokens: 5, messages: [{ role: 'user', content: 'ping' }] })
        });

        if (response.ok) {
          feedback.innerText = 'Connection Successful! ✓';
          feedback.style.color = 'var(--success)';
          checkApiStatus(true);
        } else {
          throw new Error('Unauthorized');
        }
      } catch (e) {
        feedback.innerText = 'Connection Failed ✗';
        feedback.style.color = 'var(--error)';
        checkApiStatus(false);
      } finally { btn.disabled = false; }
    }

    function saveSettings() {
      state.apiKey = document.getElementById('api-key-input').value;
      state.agentName = document.getElementById('agent-name-input').value;
      state.model = document.getElementById('model-select').value;

      localStorage.setItem('yc_api_key', state.apiKey);
      localStorage.setItem('yc_agent_name', state.agentName);
      localStorage.setItem('yc_model', state.model);

      updateHeader();
      document.getElementById('settings-modal').style.display = 'none';
      log('System', 'Settings updated and saved.', 'indigo');
      if (state.apiKey) showWelcome();
    }

    function checkApiStatus(success = null) {
      const dot = document.getElementById('api-status-dot');
      if (success === true) dot.classList.add('api-ready');
      else if (success === false) dot.classList.remove('api-ready');
      else if (state.apiKey) dot.classList.add('api-ready');
    }

    // --- Shortcuts ---
    window.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        runModule();
      }
      if (e.key === 'Escape') {
        clearInputs();
        if (document.getElementById('settings-modal').style.display === 'flex') {
          document.getElementById('settings-modal').style.display = 'none';
        }
      }
    });
  </script>
</body>

</html>
